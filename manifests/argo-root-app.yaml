apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Byteflux/infra
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
